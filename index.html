<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mind Match - Premium Edition</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Poppins', 'Segoe UI', sans-serif;
            background: radial-gradient(circle at center, #1e1e2f 0%, #0f0f1a 100%);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            color: #ffffff;
            overflow: hidden;
        }

        /* নিয়ন গ্লোয়িং টাইটেল */
        h1 {
            font-size: 3rem;
            font-weight: 800;
            letter-spacing: 4px;
            text-transform: uppercase;
            background: linear-gradient(45deg, #00f2fe, #4facfe);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0 0 30px rgba(0, 242, 254, 0.3);
            margin-bottom: 5px;
        }

        .subtitle {
            font-size: 0.9.5rem;
            color: #7070a0;
            letter-spacing: 1px;
            margin-bottom: 30px;
            text-transform: uppercase;
        }

        /* আধুনিক স্ট্যাটাস বার */
        .status-container {
            font-size: 1.2rem;
            font-weight: 600;
            padding: 12px 30px;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 50px;
            margin-bottom: 30px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.3);
            backdrop-filter: blur(10px);
            transition: all 0.3s ease;
        }

        /* থ্রিডি গ্লাস বোর্ড */
        .board {
            display: grid;
            grid-template-columns: repeat(3, 95px);
            grid-template-rows: repeat(3, 95px);
            gap: 15px;
            background: rgba(255, 255, 255, 0.02);
            padding: 20px;
            border-radius: 24px;
            border: 1px solid rgba(255, 255, 255, 0.08);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(20px);
        }

        /* প্রিমিয়াম সেল বা ঘর */
        .cell {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 3rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: inset 0 0 0 rgba(255, 255, 255, 0);
        }

        /* হোভার এবং ক্লিক অ্যানিমেশন */
        .cell:hover {
            background: rgba(255, 255, 255, 0.1);
            border-color: rgba(255, 255, 255, 0.2);
            transform: translateY(-4px) scale(1.02);
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.4);
        }

        .cell:active {
            transform: translateY(0) scale(0.98);
        }

        /* এক্স এবং ও এর জন্য স্পেশাল গ্লো ইফেক্ট */
        .cell.x-active {
            color: #00f2fe;
            text-shadow: 0 0 20px rgba(0, 242, 254, 0.6);
        }

        .cell.o-active {
            color: #ff4757;
            text-shadow: 0 0 20px rgba(255, 71, 87, 0.6);
        }

        /* নিয়ন রিস্টার্ট বাটন */
        .btn {
            margin-top: 35px;
            padding: 14px 35px;
            font-size: 1rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: #ffffff;
            background: linear-gradient(45deg, #ff4757, #ff6b81);
            border: none;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 10px 25px rgba(255, 71, 87, 0.3);
            transition: all 0.3s ease;
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 15px 30px rgba(255, 71, 87, 0.5);
            background: linear-gradient(45deg, #ff6b81, #ff4757);
        }

        .btn:active {
            transform: translateY(0);
        }
    </style>
</head>
<body>

    <h1>Mind Match</h1>
    <div class="subtitle">Ultimate Brain Duel</div>
    
    <div class="status-container" id="status">X এর চাল (Player 1)</div>
    
    <div class="board" id="board">
        <div class="cell" onclick="makeMove(this, 0)"></div>
        <div class="cell" onclick="makeMove(this, 1)"></div>
        <div class="cell" onclick="makeMove(this, 2)"></div>
        <div class="cell" onclick="makeMove(this, 3)"></div>
        <div class="cell" onclick="makeMove(this, 4)"></div>
        <div class="cell" onclick="makeMove(this, 5)"></div>
        <div class="cell" onclick="makeMove(this, 6)"></div>
        <div class="cell" onclick="makeMove(this, 7)"></div>
        <div class="cell" onclick="makeMove(this, 8)"></div>
    </div>

    <button class="btn" onclick="resetGame()">রিস্টার্ট করুন</button>

    <script>
        let board = ["", "", "", "", "", "", "", "", ""];
        let currentPlayer = "X";
        let gameActive = true;
        const statusDisplay = document.getElementById('status');

        const winPatterns = [, [3, 4, 5], [6, 7, 8],
, [1, 4, 7], [2, 5, 8],
, [2, 4, 6]
        ];

        function makeMove(cell, index) {
            if (board[index] !== "" || !gameActive) return;

            board[index] = currentPlayer;
            cell.innerText = currentPlayer;
            
            // প্লেয়ার অনুযায়ী ক্লাস যোগ করে কালার ও গ্লো দেওয়া হচ্ছে
            if (currentPlayer === "X") {
                cell.classList.add('x-active');
            } else {
                cell.classList.add('o-active');
            }

            checkResult();
        }

        function checkResult() {
            let roundWon = false;
            for (let i = 0; i < winPatterns.length; i++) {
                const [a, b, c] = winPatterns[i];
                if (board[a] && board[a] === board[b] && board[a] === board[c]) {
                    roundWon = true;
                    break;
                }
            }

            if (roundWon) {
                statusDisplay.innerText = `বিজয়ী: প্লেয়ার ${currentPlayer}! 🏆`;
                statusDisplay.style.borderColor = currentPlayer === "X" ? "#00f2fe" : "#ff4757";
                statusDisplay.style.boxShadow = `0 10px 30px ${currentPlayer === "X" ? "rgba(0,242,254,0.3)" : "rgba(255,71,87,0.3)"}`;
                gameActive = false;
                return;
            }

            if (!board.includes("")) {
                statusDisplay.innerText = "ম্যাচ ড্র! 🤝";
                statusDisplay.style.borderColor = "#95a5a6";
                gameActive = false;
                return;
            }

            currentPlayer = currentPlayer === "X" ? "O" : "X";
            statusDisplay.innerText = `${currentPlayer} এর চাল (Player ${currentPlayer === 'X' ? '1' : '2'})`;
        }

        function resetGame() {
            board = ["", "", "", "", "", "", "", "", ""];
            currentPlayer = "X";
            gameActive = true;
            statusDisplay.innerText = "X এর চাল (Player 1)";
            statusDisplay.style.borderColor = "rgba(255, 255, 255, 0.1)";
            statusDisplay.style.boxShadow = "0 10px 25px rgba(0, 0, 0, 0.3)";
            
            document.querySelectorAll('.cell').forEach(cell => {
                cell.innerText = "";
                cell.classList.remove('x-active', 'o-active');
            });
        }
    </script>
</body>
</html>
