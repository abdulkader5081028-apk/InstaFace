<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>InstaFace Cyber</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --bg-color: #000; --text-main: #f3f4f6; --accent: #a855f7; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body { background: var(--bg-color); color: var(--text-main); display: flex; justify-content: center; height: 100vh; overflow: hidden; }
        .app-container { width: 100%; max-width: 480px; height: 100vh; background: #000; display: flex; flex-direction: column; position: relative; }
        
        /* Top Header */
        .header { height: 60px; display: flex; justify-content: space-between; align-items: center; padding: 0 16px; border-bottom: 1px solid #1f2937; }
        .header h2 { font-size: 22px; font-weight: 800; background: linear-gradient(90deg, #6366f1, #a855f7); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .header-icons i { font-size: 20px; margin-left: 15px; cursor: pointer; }

        /* Main Content Feed */
        .main-feed { flex: 1; overflow-y: auto; padding-bottom: 70px; scrollbar-width: none; }
        .main-feed::-webkit-scrollbar { display: none; }

        /* Story Section */
        .stories-bar { display: flex; gap: 12px; padding: 12px 16px; overflow-x: auto; border-bottom: 1px solid #1f2937; }
        .stories-bar::-webkit-scrollbar { display: none; }
        .story-ring { width: 68px; height: 68px; border-radius: 50%; background: linear-gradient(45deg, #f58529, #dd2a7b, #8134af); padding: 2px; display: flex; flex-direction: column; align-items: center; cursor: pointer; flex-shrink: 0; }
        .story-ring img { width: 100%; height: 100%; border-radius: 50%; object-fit: cover; border: 2px solid #000; }
        .story-add { background: #262626; display: flex; justify-content: center; align-items: center; font-size: 22px; color: #fff; }

        /* Upload Box Bar */
        .upload-section { padding: 12px 16px; border-bottom: 1px solid #1f2937; display: flex; gap: 10px; align-items: center; }
        .upload-section input { flex: 1; background: #121212; border: 1px solid #262626; padding: 10px 14px; border-radius: 20px; color: #fff; outline: none; font-size: 13px; }
        .upload-btn { background: #a855f7; color: white; border: none; padding: 8px 14px; border-radius: 20px; font-weight: 600; cursor: pointer; font-size: 13px; }

        /* Post Card */
        .post-card { margin-bottom: 15px; border-bottom: 1px solid #1f2937; }
        .post-header { display: flex; align-items: center; padding: 10px 16px; gap: 10px; }
        .post-header img { width: 32px; height: 32px; border-radius: 50%; object-fit: cover; }
        .post-header span { font-weight: 600; font-size: 14px; }
        .post-image { width: 100%; max-height: 400px; object-fit: cover; }
        .post-actions { display: flex; gap: 15px; padding: 10px 16px; font-size: 20px; }
        .post-caption { padding: 0 16px 12px 16px; font-size: 13px; color: #d1d5db; }

        /* Bottom Nav */
        .bottom-nav { width: 100%; height: 60px; background: rgba(0,0,0,0.95); border-top: 1px solid #1f2937; position: absolute; bottom: 0; display: flex; justify-content: space-around; align-items: center; z-index: 10; }
        .bottom-nav i { font-size: 20px; color: #9ca3af; cursor: pointer; }
        .bottom-nav i.active { color: var(--accent); }
    </style>
</head>
<body>

    <div class="app-container">
        <!-- Header -->
        <div class="header">
            <h2>InstaFace</h2>
            <div class="header-icons">
                <i class="fa-solid fa-right-from-bracket" onclick="logout()" title="Logout"></i>
            </div>
        </div>

        <!-- Feed Body -->
        <div class="main-feed">
            <!-- Stories Bar -->
            <div class="stories-bar">
                <div class="story-ring story-add" onclick="document.getElementById('storyInput').click()">
                    <i class="fa-solid fa-plus"></i>
                </div>
                <input type="file" id="storyInput" style="display:none" accept="image/*" onchange="uploadStory(event)">
                <div class="story-ring"><img src="https://images.unsplash.com/photo-1534528741775-53994a69daeb?w=150"></div>
                <div class="story-ring"><img src="https://images.unsplash.com/photo-1507003211169-0a1dd7228f2d?w=150"></div>
            </div>

            <!-- Upload Post/Video Bar -->
            <div class="upload-section">
                <input type="text" id="postCaption" placeholder="What's on your cyber mind?">
                <input type="file" id="mediaInput" style="display:none" accept="image/*,video/*">
                <button class="upload-btn" onclick="document.getElementById('mediaInput').click()">Media</button>
                <button class="upload-btn" onclick="addNewPost()">Post</button>
            </div>

            <!-- Dynamic Posts Feed -->
            <div id="feedContainer">
                <div class="post-card">
                    <div class="post-header">
                        <img src="https://images.unsplash.com/photo-1534528741775-53994a69daeb?w=150">
                        <span>neon_vector</span>
                    </div>
                    <img class="post-image" src="https://assets.mixkit.co/videos/preview/mixkit-neon-light-from-a-tunnel-in-a-futuristic-city-43225-large.jpg">
                    <div class="post-actions">
                        <i class="fa-regular fa-heart" onclick="this.classList.toggle('fa-solid'); this.classList.toggle('fa-regular'); this.style.color='#ef4444'"></i>
                        <i class="fa-regular fa-comment"></i>
                        <i class="fa-regular fa-paper-plane"></i>
                    </div>
                    <div class="post-caption"><b>neon_vector</b> Welcome to the redesigned matrix! ⚡</div>
                </div>
            </div>
        </div>

        <!-- Bottom Navigation -->
        <div class="bottom-nav">
            <i class="fa-solid fa-layer-group active" onclick="window.location.href='index.html'"></i>
            <i class="fa-solid fa-video" onclick="window.location.href='reels.html'"></i>
            <i class="fa-regular fa-compass"></i>
            <i class="fa-regular fa-user" onclick="window.location.href='login.html'"></i>
        </div>
    </div>

    <script>
        function logout() {
            localStorage.removeItem('cyberUser');
            alert('Logged out successfully!');
            window.location.href = 'login.html';
        }

        function uploadStory(event) {
            const file = event.target.files[0];
            if(file) {
                alert('Story uploaded successfully!');
            }
        }

        function addNewPost() {
            const caption = document.getElementById('postCaption').value;
            const fileInput = document.getElementById('mediaInput').files[0];
            
            if(caption.trim() === "" && !fileInput) {
                alert('Please write something or select a media file!');
                return;
            }

            const username = localStorage.getItem('cyberUser') || 'cyber_user';
            const feed = document.getElementById('feedContainer');
            
            let mediaHtml = '';
            if(fileInput) {
                const mediaUrl = URL.createObjectURL(fileInput);
                if(fileInput.type.includes('video')) {
                    mediaHtml = `<video class="post-image" src="${mediaUrl}" controls autoplay muted></video>`;
                } else {
                    mediaHtml = `<img class="post-image" src="${mediaUrl}">`;
                }
            }

            const newPostHTML = `
                <div class="post-card">
                    <div class="post-header">
                        <img src="https://images.unsplash.com/photo-1534528741775-53994a69daeb?w=150">
                        <span>${username}</span>
                    </div>
                    ${mediaHtml}
                    <div class="post-actions">
                        <i class="fa-regular fa-heart" onclick="this.classList.toggle('fa-solid'); this.classList.toggle('fa-regular'); this.style.color='#ef4444'"></i>
                        <i class="fa-regular fa-comment"></i>
                        <i class="fa-regular fa-paper-plane"></i>
                    </div>
                    <div class="post-caption"><b>${username}</b> ${caption}</div>
                </div>
            `;

            feed.insertAdjacentHTML('afterbegin', newPostHTML);
            document.getElementById('postCaption').value = '';
            document.getElementById('mediaInput').value = '';
            alert('Post published successfully!');
        }
    </script>
</body>
</html>
