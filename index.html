<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>InstaFace Cyber</title>
    <!-- FontAwesome Elements for Clean Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: #08090a;
            color: #f3f4f6;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            padding-bottom: 80px;
        }

        /* Premium Floating Toast */
        .toast {
            position: fixed;
            top: 25px;
            background: linear-gradient(135deg, #1e1b4b, #311042);
            border: 1px solid #4338ca;
            color: #e0e7ff;
            padding: 12px 28px;
            border-radius: 30px;
            font-size: 14px;
            font-weight: 500;
            box-shadow: 0 10px 30px rgba(67, 56, 202, 0.3);
            display: none;
            z-index: 10000;
            animation: slideDownFade 2.5s ease-in-out;
        }

        @keyframes slideDownFade {
            0% { opacity: 0; transform: translateY(-30px); }
            15% { opacity: 1; transform: translateY(0); }
            85% { opacity: 1; transform: translateY(0); }
            100% { opacity: 0; transform: translateY(-30px); }
        }

        /* Cyberpunk Fluid Header */
        .app-header {
            width: 100%;
            max-width: 480px;
            height: 60px;
            background-color: rgba(8, 9, 10, 0.8);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-bottom: 1px solid #1f2937;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 20px;
            position: sticky;
            top: 0;
            z-index: 1000;
        }

        .app-header h1 {
            font-size: 22px;
            font-weight: 800;
            letter-spacing: -1px;
            background: linear-gradient(90deg, #6366f1, #a855f7, #ec4899);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .app-header .header-icons {
            display: flex;
            gap: 22px;
        }

        .header-icons i {
            font-size: 20px;
            color: #9ca3af;
            cursor: pointer;
            transition: color 0.2s, transform 0.2s;
        }
        
        .header-icons i:hover {
            color: #a855f7;
            transform: translateY(-1px);
        }

        /* Container */
        .app-container {
            width: 100%;
            max-width: 480px;
            padding: 12px;
        }

        /* Clean Card UI for Post Box */
        .create-post-box {
            background: #111317;
            border: 1px solid #1f2937;
            border-radius: 20px;
            padding: 20px;
            margin-bottom: 20px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.2);
        }

        .input-row {
            display: flex;
            gap: 14px;
            margin-bottom: 16px;
        }

        .avatar-ring {
            padding: 2px;
            background: linear-gradient(135deg, #6366f1, #a855f7);
            border-radius: 50%;
            width: 44px;
            height: 44px;
        }

        .user-avatar {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            object-fit: cover;
            border: 2px solid #111317;
        }

        .create-post-box textarea {
            flex: 1;
            background: transparent;
            border: none;
            resize: none;
            font-size: 15px;
            outline: none;
            padding-top: 6px;
            color: #f3f4f6;
            line-height: 1.5;
        }

        .create-post-box textarea::placeholder {
            color: #4b5563;
        }

        .url-input-field {
            width: 100%;
            border: 1px solid #374151;
            border-radius: 12px;
            padding: 10px 16px;
            font-size: 13px;
            outline: none;
            background-color: #1f2937;
            color: #ffffff;
            margin-bottom: 16px;
            display: none;
            transition: border-color 0.3s;
        }
        
        .url-input-field:focus {
            border-color: #a855f7;
        }

        .action-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .photo-btn-label {
            color: #9ca3af;
            font-size: 13px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
            font-weight: 500;
            padding: 8px 14px;
            border-radius: 30px;
            background-color: #1f2937;
            transition: all 0.2s;
        }

        .photo-btn-label:hover {
            background-color: #374151;
            color: #ffffff;
        }

        .submit-post-btn {
            background: linear-gradient(90deg, #6366f1, #a855f7);
            color: white;
            border: none;
            padding: 8px 24px;
            border-radius: 30px;
            font-weight: 600;
            font-size: 13px;
            cursor: pointer;
            box-shadow: 0 4px 12px rgba(168, 85, 247, 0.2);
            transition: all 0.2s;
        }

        .submit-post-btn:hover {
            transform: translateY(-1px);
            box-shadow: 0 6px 16px rgba(168, 85, 247, 0.4);
        }

        /* Feed Elements */
        .feed-list {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .post-card {
            background: #111317;
            border: 1px solid #1f2937;
            border-radius: 24px;
            overflow: hidden;
            box-shadow: 0 4px 20px rgba(0,0,0,0.15);
        }

        .post-card-header {
            display: flex;
            align-items: center;
            padding: 16px;
        }

        .post-user-meta {
            display: flex;
            flex-direction: column;
            margin-left: 12px;
        }

        .username {
            font-weight: 600;
            font-size: 14px;
            color: #f3f4f6;
        }

        .time-stamp {
            font-size: 11px;
            color: #6b7280;
            margin-top: 1px;
        }

        .img-container {
            position: relative;
            width: 100%;
            overflow: hidden;
            background: #08090a;
        }

        .post-content-img {
            width: 100%;
            max-height: 440px;
            object-fit: cover;
            display: block;
        }

        /* Custom Modern Action Panel */
        .post-action-bar {
            display: flex;
            gap: 20px;
            padding: 16px 16px 8px 16px;
        }

        .action-icon {
            font-size: 22px;
            color: #9ca3af;
            cursor: pointer;
            transition: transform 0.15s ease, color 0.15s ease;
        }

        .action-icon:hover {
            color: #f3f4f6;
            transform: scale(1.05);
        }

        .fa-heart.active-liked {
            color: #ef4444;
            animation: cyberHeart 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        @keyframes cyberHeart {
            0% { transform: scale(1); }
            40% { transform: scale(1.35); }
            70% { transform: scale(0.9); }
            100% { transform: scale(1); }
        }

        .likes-display {
            padding: 4px 16px;
            font-size: 13px;
            font-weight: 600;
            color: #d1d5db;
        }

        .post-content-text {
            padding: 4px 16px 16px 16px;
            font-size: 14px;
            color: #9ca3af;
            line-height: 1.5;
            border-bottom: 1px solid #1f2937;
        }

        .post-content-text strong {
            margin-right: 8px;
            color: #ffffff;
        }

        /* Techy Comments Section */
        .comments-section {
            padding: 12px 16px 16px 16px;
            background: #14171c;
        }

        .comments-box-list {
            list-style: none;
            max-height: 110px;
            overflow-y: auto;
            margin-bottom: 12px;
            font-size: 13px;
        }

        .comments-box-list li {
            margin-bottom: 6px;
            color: #9ca3af;
        }

        .comments-box-list strong {
            color: #e5e7eb;
            margin-right: 6px;
        }

        .input-comment-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background-color: #1b1e24;
            border: 1px solid #2d3748;
            border-radius: 14px;
            padding: 6px 14px;
        }

        .input-comment-row input {
            flex: 1;
            background: transparent;
            border: none;
            outline: none;
            font-size: 13px;
            color: #ffffff;
        }

        .input-comment-row input::placeholder {
            color: #4b5563;
        }

        .send-comment-btn {
            background: transparent;
            border: none;
            color: #a855f7;
            font-weight: 600;
            font-size: 13px;
            cursor: pointer;
            padding-left: 8px;
            transition: color 0.2s;
        }

        .send-comment-btn:hover {
            color: #6366f1;
        }

        /* Futuristic Bottom Navbar */
        .bottom-nav {
            width: 100%;
            max-width: 480px;
            height: 60px;
            background-color: rgba(11, 13, 17, 0.9);
            backdrop-filter: blur(15px);
            border-top: 1px solid #1f2937;
            position: fixed;
            bottom: 0;
            display: flex;
            justify-content: space-around;
            align-items: center;
            z-index: 1000;
        }

        .bottom-nav i {
            font-size: 20px;
            color: #6b7280;
            cursor: pointer;
            transition: all 0.2s;
        }
        
        .bottom-nav i:hover, .bottom-nav i.active-nav {
            color: #a855f7;
            transform: scale(1.1);
        }

        .bottom-nav-avatar {
            width: 26px;
            height: 26px;
            border-radius: 50%;
            object-fit: cover;
            border: 1px solid #6b7280;
            cursor: pointer;
        }
    </style>
</head>
<body>

    <!-- Notification Toast -->
    <div id="toastNotification" class="toast">Link copied to tech clipboard!</div>

    <!-- App Header -->
    <div class="app-header">
        <h1>InstaFace</h1>
        <div class="header-icons">
            <i class="fa-regular fa-bell"></i>
            <i class="fa-regular fa-paper-plane"></i>
        </div>
    </div>

    <!-- Container Area -->
    <div class="app-container">
        
        <!-- Post Entry Card -->
        <div class="create-post-box">
            <div class="input-row">
                <div class="avatar-ring">
                    <img src="https://images.unsplash.com/photo-1534528741775-53994a69daeb?w=150" class="user-avatar" alt="User">
                </div>
                <textarea id="postInputText" placeholder="Share your thoughts or logs..."></textarea>
            </div>
            <input type="text" id="postImgUrl" class="url-input-field" placeholder="Feed Image URL here...">
            <div class="action-row">
                <div class="photo-btn-label" onclick="toggleUrlInput()">
                    <i class="fa-regular fa-image"></i> Graphic
                </div>
                <button class="submit-post-btn" onclick="addNewPost()">Broadcast</button>
            </div>
        </div>

        <!-- Dynamic Feed -->
        <div class="feed-list" id="mainFeed"></div>
    </div>

    <!-- Bottom Actions Tab -->
    <div class="bottom-nav">
        <i class="fa-solid fa-layer-group active-nav"></i>
        <i class="fa-solid fa-terminal"></i>
        <i class="fa-regular fa-square-plus" onclick="document.getElementById('postInputText').focus(); toggleUrlInput();"></i>
        <i class="fa-regular fa-compass"></i>
        <img src="https://images.unsplash.com/photo-1534528741775-53994a69daeb?w=150" class="bottom-nav-avatar">
    </div>

    <!-- Functional Engine Core -->
    <script>
        let posts = JSON.parse(localStorage.getItem('instaface_cyber_posts')) || [
            {
                id: 1,
                username: "neon_vector",
                time: "2 hours ago",
                text: "Welcome to the rebranded aesthetic. Designed for absolute focus. ⚡🌐",
                img: "https://images.unsplash.com/photo-1618005182384-a83a8bd57fbe?w=600",
                likes: 42,
                likedByUser: false,
                comments: ["This style hits completely different.", "Loving the clean vibe."]
            }
        ];

        function renderFeed() {
            const feed = document.getElementById('mainFeed');
            feed.innerHTML = "";

            posts.forEach(post => {
                let imgTag = post.img ? `<div class="img-container"><img src="${post.img}" class="post-content-img" ondblclick="handleLike(${post.id})"></div>` : '';
                let heartIcon = post.likedByUser ? 'fa-solid fa-heart active-liked' : 'fa-regular fa-heart';
                
                let commentItems = "";
                post.comments.forEach(c => {
                    commentItems += `<li><strong>operator</strong> ${c}</li>`;
                });

                const postHTML = `
                    <div class="post-card" id="post-${post.id}">
                        <div class="post-card-header">
                            <div class="avatar-ring" style="width:36px; height:36px;">
                                <img src="https://images.unsplash.com/photo-1534528741775-53994a69daeb?w=150" class="user-avatar">
                            </div>
                            <div class="post-user-meta">
                                <span class="username">${post.username}</span>
                                <span class="time-stamp">${post.time}</span>
                            </div>
                        </div>
                        ${imgTag}
                        <div class="post-action-bar">
                            <i class="${heartIcon} action-icon" onclick="handleLike(${post.id})"></i>
                            <i class="fa-regular fa-comment action-icon" onclick="focusCommentField(${post.id})"></i>
                            <i class="fa-regular fa-share-from-square action-icon" onclick="triggerShare()"></i>
                        </div>
                        <div class="likes-display"><span>${post.likes}</span> interactions</div>
                        <div class="post-content-text">
                            <strong>${post.username}</strong>${post.text}
                        </div>
                        <div class="comments-section">
                            <ul class="comments-box-list">${commentItems}</ul>
                            <div class="input-comment-row">
                                <input type="text" placeholder="Add terminal log..." onkeypress="checkCommentEnter(event, ${post.id}, this)">
                                <button class="send-comment-btn" onclick="addComment(${post.id}, this)">Send</button>
                            </div>
                        </div>
                    </div>
                `;
                feed.insertAdjacentHTML('beforeend', postHTML);
            });
        }

        function saveToStorage() {
            localStorage.setItem('instaface_cyber_posts', JSON.stringify(posts));
        }

        function toggleUrlInput() {
            const imgField = document.getElementById('postImgUrl');
            imgField.style.display = (imgField.style.display === 'block') ? 'none' : 'block';
        }

        function addNewPost() {
            const txt = document.getElementById('postInputText').value.trim();
            const url = document.getElementById('postImgUrl').value.trim();

            if(!txt && !url) return;

            const newPost = {
                id: Date.now(),
                username: "user_prime",
                time: "Just now",
                text: txt,
                img: url || null,
                likes: 0,
                likedByUser: false,
                comments: []
            };

            posts.unshift(newPost);
            saveToStorage();
            renderFeed();

            document.getElementById('postInputText').value = "";
            document.getElementById('postImgUrl').value = "";
            document.getElementById('postImgUrl').style.display = 'none';
        }

        function handleLike(id) {
            const post = posts.find(p => p.id === id);
            if(post) {
                if(post.likedByUser) {
                    post.likes--;
                    post.likedByUser = false;
                } else {
                    post.likes++;
                    post.likedByUser = true;
                }
                saveToStorage();
                renderFeed();
            }
        }

        function addComment(id, btn) {
            const input = btn.previousElementSibling;
            const text = input.value.trim();
            if(!text) return;

            const post = posts.find(p => p.id === id);
            if(post) {
                post.comments.push(text);
                saveToStorage();
                renderFeed();
            }
        }

        function checkCommentEnter(e, id, input) {
            if(e.key === 'Enter') {
                const btn = input.nextElementSibling;
                addComment(id, btn);
            }
        }

        function focusCommentField(id) {
            const postEl = document.getElementById(`post-${id}`);
            postEl.querySelector('.input-comment-row input').focus();
        }

        function triggerShare() {
            const toast = document.getElementById('toastNotification');
            toast.style.display = 'block';
            setTimeout(() => { toast.style.display = 'none'; }, 2500);
        }

        renderFeed();
    </script>
</body>
</html>
