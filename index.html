<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Instagram</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; }
        body { background: #000; color: #f5f5f5; display: flex; justify-content: center; height: 100vh; overflow: hidden; }
        .app-container { width: 100%; max-width: 480px; height: 100vh; background: #000; display: flex; flex-direction: column; position: relative; }
        
        /* Top Header */
        .header { height: 54px; display: flex; justify-content: space-between; align-items: center; padding: 0 16px; border-bottom: 1px solid #262626; flex-shrink: 0; background: #000; z-index: 10; }
        .insta-logo-text { font-family: 'Instagram Billabong', cursive, sans-serif; font-size: 26px; font-weight: 500; letter-spacing: 1px; }
        .header-icons { display: flex; gap: 20px; align-items: center; }
        .header-icons i { font-size: 22px; cursor: pointer; color: #f5f5f5; }

        /* Main Feed */
        .main-feed { flex: 1; overflow-y: auto; padding-bottom: 60px; scrollbar-width: none; }
        .main-feed::-webkit-scrollbar { display: none; }

        /* Stories */
        .stories-bar { display: flex; gap: 12px; padding: 10px 16px; overflow-x: auto; border-bottom: 1px solid #262626; flex-shrink: 0; background: #000; }
        .stories-bar::-webkit-scrollbar { display: none; }
        .story-ring { width: 62px; height: 62px; border-radius: 50%; background: linear-gradient(45deg, #f58529, #dd2a7b, #8134af); padding: 2px; display: flex; flex-direction: column; align-items: center; cursor: pointer; flex-shrink: 0; }
        .story-ring img { width: 100%; height: 100%; border-radius: 50%; object-fit: cover; border: 2px solid #000; }
        .story-add { background: #262626; display: flex; justify-content: center; align-items: center; font-size: 20px; color: #fff; }

        /* Upload Section */
        .upload-section { padding: 10px 16px; border-bottom: 1px solid #262626; display: flex; gap: 8px; align-items: center; background: #000; }
        .upload-section input { flex: 1; background: #121212; border: 1px solid #262626; padding: 8px 12px; border-radius: 8px; color: #fff; outline: none; font-size: 13px; }
        .upload-btn { background: #0095f6; color: white; border: none; padding: 8px 12px; border-radius: 8px; font-weight: 600; cursor: pointer; font-size: 13px; }

        /* Post Card */
        .post-card { margin-bottom: 12px; border-bottom: 1px solid #262626; background: #000; }
        .post-header { display: flex; align-items: center; padding: 10px 16px; gap: 10px; }
        .post-header img { width: 32px; height: 32px; border-radius: 50%; object-fit: cover; }
        .post-header span { font-weight: 600; font-size: 13px; }
        .post-image { width: 100%; max-height: 450px; object-fit: cover; background: #121212; }
        .post-actions { display: flex; justify-content: space-between; padding: 10px 16px; font-size: 22px; }
        .post-actions-left { display: flex; gap: 16px; }
        .post-caption { padding: 0 16px 12px 16px; font-size: 13px; color: #f5f5f5; }
        .post-caption b { margin-right: 6px; }

        /* Bottom Nav */
        .bottom-nav { width: 100%; max-width: 480px; height: 50px; background: #000; border-top: 1px solid #262626; position: absolute; bottom: 0; left: 0; display: flex; justify-content: space-around; align-items: center; z-index: 10; }
        .bottom-nav i { font-size: 22px; color: #f5f5f5; cursor: pointer; }
        .bottom-nav i.active { color: #fff; }
    </style>
</head>
<body>

    <div class="app-container">
        <!-- Header -->
        <div class="header">
            <div class="insta-logo-text">Instagram</div>
            <div class="header-icons">
                <i class="fa-regular fa-heart"></i>
                <i class="fa-regular fa-paper-plane" onclick="logout()" title="Logout"></i>
            </div>
        </div>

        <!-- Main Feed -->
        <div class="main-feed">
            <!-- Stories -->
            <div class="stories-bar">
                <div class="story-ring story-add" onclick="document.getElementById('storyInput').click()">
                    <i class="fa-solid fa-plus" style="font-size: 16px;"></i>
                </div>
                <input type="file" id="storyInput" style="display:none" accept="image/*" onchange="uploadStory(event)">
                <div class="story-ring"><img src="https://images.unsplash.com/photo-1534528741775-53994a69daeb?w=150"></div>
                <div class="story-ring"><img src="https://images.unsplash.com/photo-1507003211169-0a1dd7228f2d?w=150"></div>
            </div>

            <!-- Upload Post -->
            <div class="upload-section">
                <input type="text" id="postCaption" placeholder="Write a caption...">
                <input type="file" id="mediaInput" style="display:none" accept="image/*,video/*">
                <button class="upload-btn" onclick="document.getElementById('mediaInput').click()">Select</button>
                <button class="upload-btn" onclick="addNewPost()">Share</button>
            </div>

            <!-- Posts Container -->
            <div id="feedContainer">
                <div class="post-card">
                    <div class="post-header">
                        <img src="https://images.unsplash.com/photo-1534528741775-53994a69daeb?w=150">
                        <span>instagram_user</span>
                    </div>
                    <img class="post-image" src="https://images.unsplash.com/photo-1618005182384-a83a8bd57fbe?w=600">
                    <div class="post-actions">
                        <div class="post-actions-left">
                            <i class="fa-regular fa-heart" onclick="toggleLike(this)"></i>
                            <i class="fa-regular fa-comment"></i>
                            <i class="fa-regular fa-paper-plane"></i>
                        </div>
                        <i class="fa-regular fa-bookmark"></i>
                    </div>
                    <div class="post-caption"><b>instagram_user</b> Welcome to Instagram! ✨</div>
                </div>
            </div>
        </div>

        <!-- Bottom Navigation Bar -->
        <div class="bottom-nav">
            <i class="fa-solid fa-house active" onclick="window.location.href='index.html'"></i>
            <i class="fa-solid fa-magnifying-glass" onclick="window.location.href='reels.html'"></i>
            <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
            <i class="fa-regular fa-square-plus" onclick="document.getElementById('mediaInput').click()"></i>
            <i class="fa-solid fa-clapperboard" onclick="window.location.href='reels.html'"></i>
            <i class="fa-regular fa-user" onclick="window.location.href='profile.html'"></i>
        </div>
    </div>

    <script>
        window.onload = function() {
            loadPosts();
        }

        function logout() {
            localStorage.removeItem('cyberUser');
            window.location.href = 'login.html';
        }

        function uploadStory(event) {
            if(event.target.files[0]) {
                alert('Story added successfully!');
            }
        }

        function toggleLike(element) {
            element.classList.toggle('fa-solid');
            element.classList.toggle('fa-regular');
            element.style.color = element.classList.contains('fa-solid') ? '#ff3040' : '#f5f5f5';
        }

        function addNewPost() {
            const caption = document.getElementById('postCaption').value;
            const fileInput = document.getElementById('mediaInput').files[0];
            
            if(caption.trim() === "" && !fileInput) {
                alert('Please add a caption or media!');
                return;
            }

            const username = localStorage.getItem('cyberUser') || 'user_insta';
            let mediaUrl = '';
            let mediaType = 'image';

            if(fileInput) {
                mediaUrl = URL.createObjectURL(fileInput);
                if(fileInput.type.includes('video')) mediaType = 'video';
            }

            const newPost = {
                username: username,
                caption: caption,
                mediaUrl: mediaUrl,
                mediaType: mediaType,
                avatar: "https://images.unsplash.com/photo-1534528741775-53994a69daeb?w=150"
            };

            let posts = JSON.parse(localStorage.getItem('instaPosts')) || [];
            posts.unshift(newPost);
            localStorage.setItem('instaPosts', JSON.stringify(posts));

            document.getElementById('postCaption').value = '';
            document.getElementById('mediaInput').value = '';
            loadPosts();
        }

        function loadPosts() {
            const feed = document.getElementById('feedContainer');
            let posts = JSON.parse(localStorage.getItem('instaPosts')) || [];

            let html = `
                <div class="post-card">
                    <div class="post-header">
                        <img src="https://images.unsplash.com/photo-1534528741775-53994a69daeb?w=150">
                        <span>instagram_user</span>
                    </div>
                    <img class="post-image" src="https://images.unsplash.com/photo-1618005182384-a83a8bd57fbe?w=600">
                    <div class="post-actions">
                        <div class="post-actions-left">
                            <i class="fa-regular fa-heart" onclick="toggleLike(this)"></i>
                            <i class="fa-regular fa-comment"></i>
                            <i class="fa-regular fa-paper-plane"></i>
                        </div>
                        <i class="fa-regular fa-bookmark"></i>
                    </div>
                    <div class="post-caption"><b>instagram_user</b> Welcome to Instagram! ✨</div>
                </div>
            `;

            posts.forEach(post => {
                let mediaElement = '';
                if(post.mediaUrl) {
                    if(post.mediaType === 'video') {
                        mediaElement = `<video class="post-image" src="${post.mediaUrl}" controls autoplay muted></video>`;
                    } else {
                        mediaElement = `<img class="post-image" src="${post.mediaUrl}">`;
                    }
                }

                html += `
                    <div class="post-card">
                        <div class="post-header">
                            <img src="${post.avatar}">
                            <span>${post.username}</span>
                        </div>
                        ${mediaElement}
                        <div class="post-actions">
                            <div class="post-actions-left">
                                <i class="fa-regular fa-heart" onclick="toggleLike(this)"></i>
                                <i class="fa-regular fa-comment"></i>
                                <i class="fa-regular fa-paper-plane"></i>
                            </div>
                            <i class="fa-regular fa-bookmark"></i>
                        </div>
                        <div class="post-caption"><b>${post.username}</b> ${post.caption}</div>
                    </div>
                `;
            });

            feed.innerHTML = html;
        }
    </script>
</body>
</html>
