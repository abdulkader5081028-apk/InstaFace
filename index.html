<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Civil Mind Match - Bridge Builder</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(180deg, #1e272e 0%, #0f141c 100%);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            color: #fff;
            padding: 20px;
        }

        /* সিভিল ইঞ্জিনিয়ারিং থিম টাইটেল */
        h1 {
            font-size: 2.2rem;
            font-weight: 800;
            color: #f5cd79;
            text-transform: uppercase;
            letter-spacing: 2px;
            text-shadow: 0 4px 10px rgba(245, 205, 121, 0.3);
            text-align: center;
        }

        .subtitle {
            font-size: 0.9rem;
            color: #f7d794;
            opacity: 0.8;
            margin-bottom: 20px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        /* স্কোর ও স্ট্যাটাস */
        .status-panel {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(245, 205, 121, 0.2);
            padding: 10px 25px;
            border-radius: 30px;
            font-size: 1.1rem;
            font-weight: 600;
            margin-bottom: 25px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.3);
        }

        /* ৩x৩ প্রিমিয়াম গ্রিড */
        .board {
            display: grid;
            grid-template-columns: repeat(3, 100px);
            grid-template-rows: repeat(3, 100px);
            gap: 15px;
            background: rgba(255, 255, 255, 0.02);
            padding: 15px;
            border-radius: 20px;
            border: 2px solid #f5cd79;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.5);
        }

        /* প্রতিটি ঘরের ভেতরের ইমেজ স্টাইল */
        .cell {
            background: rgba(255, 255, 255, 0.07);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.2s ease;
            overflow: hidden;
            padding: 10px;
        }

        .cell:hover {
            background: rgba(245, 205, 121, 0.15);
            transform: scale(1.05);
        }

        .cell img {
            width: 100%;
            height: 100%;
            object-fit: contain;
            animation: popIn 0.3s ease-in-out;
        }

        @keyframes popIn {
            0% { transform: scale(0); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }

        /* ইঞ্জিনিয়ারিং রিস্টার্ট বাটন */
        .btn {
            margin-top: 30px;
            padding: 12px 35px;
            font-size: 1rem;
            font-weight: 700;
            color: #1e272e;
            background: #f5cd79;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 8px 20px rgba(245, 205, 121, 0.3);
            transition: all 0.3s ease;
            text-transform: uppercase;
        }

        .btn:hover {
            background: #f7d794;
            transform: translateY(-2px);
            box-shadow: 0 12px 25px rgba(245, 205, 121, 0.5);
        }
    </style>
</head>
<body>

    <h1>CIVIL MIND MATCH</h1>
    <div class="subtitle">Bridge Engineering Edition</div>
    
    <div class="status-panel" id="status">ইঞ্জিনিয়ার ১ (রড ও সিমেন্ট) এর চাল</div>
    
    <div class="board" id="board">
        <div class="cell" onclick="makeMove(this, 0)"></div>
        <div class="cell" onclick="makeMove(this, 1)"></div>
        <div class="cell" onclick="makeMove(this, 2)"></div>
        <div class="cell" onclick="makeMove(this, 3)"></div>
        <div class="cell" onclick="makeMove(this, 4)"></div>
        <div class="cell" onclick="makeMove(this, 5)"></div>
        <div class="cell" onclick="makeMove(this, 6)"></div>
        <div class="cell" onclick="makeMove(this, 7)"></div>
        <div class="cell" onclick="makeMove(this, 8)"></div>
    </div>

    <button class="btn" onclick="resetGame()">প্রজেক্ট রিস্টার্ট</button>

    <script>
        let board = ["", "", "", "", "", "", "", "", ""];
        let currentPlayer = "X"; // X = Engineer 1, O = Engineer 2
        let gameActive = true;
        const statusDisplay = document.getElementById('status');

        // হাই-কোয়ালিটি সিভিল ইঞ্জিনিয়ারিং ওপেন সোর্স পিকচার লিংক
        const imgX = "https://icons8.com"; // রড/বিম
        const imgO = "https://icons8.com"; // হেলমেট

        const winPatterns = [
            [0, 1, 2], [3, 4, 5], [6, 7, 8], // পাশাপাশি
            [0, 3, 6], [1, 4, 7], [2, 5, 8], // উপর-নিচ
            [0, 4, 8], [2, 4, 6]             // কোণাকুণি
        ];

        function makeMove(cell, index) {
            if (board[index] !== "" || !gameActive) return;

            board[index] = currentPlayer;
            
            // সুন্দর পিকচার যুক্ত করা
            const img = document.createElement('img');
            img.src = currentPlayer === "X" ? imgX : imgO;
            cell.appendChild(img);

            checkResult();
        }

        function checkResult() {
            let roundWon = false;
            for (let i = 0; i < winPatterns.length; i++) {
                const [a, b, c] = winPatterns[i];
                if (board[a] && board[a] === board[b] && board[a] === board[c]) {
                    roundWon = true;
                    break;
                }
            }

            if (roundWon) {
                statusDisplay.innerText = `🎉 চমৎকার! ইঞ্জিনিয়ার ${currentPlayer === 'X' ? '১' : '২'} নিখুঁত ব্রিজ ডিজাইন সম্পন্ন করেছেন!`;
                statusDisplay.style.color = "#4cd137";
                gameActive = false;
                return;
            }

            if (!board.includes("")) {
                statusDisplay.innerText = "🤝 প্রজেক্ট ড্র! দুই ইঞ্জিনিয়ারেরই সমান অবদান।";
                statusDisplay.style.color = "#d2dae2";
                gameActive = false;
                return;
            }

            currentPlayer = currentPlayer === "X" ? "O" : "X";
            statusDisplay.innerText = `ইঞ্জিনিয়ার ${currentPlayer === 'X' ? '১ (রড)' : '২ (হেলমেট)'} এর চাল`;
        }

        function resetGame() {
            board = ["", "", "", "", "", "", "", "", ""];
            currentPlayer = "X";
            gameActive = true;
            statusDisplay.innerText = "ইঞ্জিনিয়ার ১ (রড ও সিমেন্ট) এর চাল";
            statusDisplay.style.color = "#fff";
            document.querySelectorAll('.cell').forEach(cell => cell.innerHTML = "");
        }
    </script>
</body>
</html>
