<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>InstaFace Cyber • Register Matrix</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --bg-color: #030008;
            --panel-bg: rgba(23, 15, 38, 0.7);
            --border-glow: #3b1d5c;
            --accent-glow: linear-gradient(90deg, #6366f1, #a855f7, #ec4899);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
        }

        body {
            background-color: var(--bg-color);
            background-image: radial-gradient(circle at 50% 20%, #1a0b36 0%, #030008 80%);
            color: #ffffff;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }

        .auth-container {
            width: 100%;
            max-width: 400px;
            padding: 30px;
            background: var(--panel-bg);
            backdrop-filter: blur(16px);
            border: 1px solid var(--border-glow);
            border-radius: 24px;
            box-shadow: 0 0 40px rgba(168, 85, 247, 0.15);
            display: flex;
            flex-direction: column;
            align-items: center;
            position: relative;
        }

        .cyber-logo {
            font-size: 30px;
            font-weight: 900;
            letter-spacing: 1.5px;
            background: var(--accent-glow);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 8px;
            text-transform: uppercase;
        }

        .cyber-sub {
            font-size: 13px;
            color: #9ca3af;
            margin-bottom: 25px;
            text-align: center;
        }

        .input-group {
            width: 100%;
            margin-bottom: 14px;
        }

        .input-group input {
            width: 100%;
            padding: 14px 16px;
            background: rgba(10, 5, 20, 0.8);
            border: 1px solid #3b1d5c;
            border-radius: 12px;
            color: #fff;
            font-size: 14px;
            outline: none;
            transition: all 0.3s ease;
        }

        .input-group input:focus {
            border-color: #a855f7;
            box-shadow: 0 0 12px rgba(168, 85, 247, 0.4);
        }

        .cyber-btn {
            width: 100%;
            padding: 14px;
            background: var(--accent-glow);
            border: none;
            border-radius: 12px;
            color: white;
            font-size: 15px;
            font-weight: 700;
            cursor: pointer;
            margin-top: 10px;
            box-shadow: 0 4px 20px rgba(168, 85, 247, 0.4);
            transition: transform 0.2s;
        }

        .cyber-btn:active {
            transform: scale(0.98);
        }

        .switch-auth {
            margin-top: 25px;
            font-size: 13px;
            color: #9ca3af;
        }

        .switch-auth span {
            color: #a855f7;
            font-weight: 600;
            cursor: pointer;
        }
    </style>
</head>
<body>

    <div class="auth-container">
        <div class="cyber-logo">InstaFace Cyber</div>
        <p class="cyber-sub">Initialize your digital identity in the grid</p>

        <div class="input-group">
            <input type="text" id="regEmail" placeholder="Cyber Email or Handle">
        </div>
        <div class="input-group">
            <input type="text" id="regFullname" placeholder="Agent Full Name">
        </div>
        <div class="input-group">
            <input type="text" id="regUsername" placeholder="Unique Cyber Username">
        </div>
        <div class="input-group">
            <input type="password" id="regPassword" placeholder="Access Cipher (Password)">
        </div>

        <button class="cyber-btn" onclick="handleRegister()">Establish Matrix ID</button>

        <div class="switch-auth">
            Already in the grid? <span onclick="window.location.href='login.html'">Access Login</span>
        </div>
    </div>

    <script>
        function handleRegister() {
            const user = document.getElementById('regUsername').value;
            const pass = document.getElementById('regPassword').value;

            if(user.trim() === "" || pass.trim() === "") {
                alert('⚠️ Please fill out all matrix requirements!');
            } else {
                localStorage.setItem('cyberUser', user);
                alert('⚡ Cyber ID successfully generated for: ' + user);
                window.location.href = 'index.html';
            }
        }
    </script>
</body>
</html>
