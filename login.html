<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>InstaFace • Login</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background-color: #000000;
            color: #ffffff;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }

        .login-container {
            width: 100%;
            max-width: 360px;
            padding: 24px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* InstaFace Gradient Logo Style */
        .insta-logo {
            font-size: 38px;
            font-weight: 800;
            margin-bottom: 35px;
            letter-spacing: 1px;
            background: linear-gradient(90deg, #6366f1, #a855f7, #dd2a7b);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .input-box {
            width: 100%;
            margin-bottom: 12px;
        }

        .input-box input {
            width: 100%;
            padding: 14px 16px;
            background: #121212;
            border: 1px solid #262626;
            border-radius: 8px;
            color: #ffffff;
            font-size: 14px;
            outline: none;
        }

        .login-btn {
            width: 100%;
            padding: 14px;
            background: #0095f6;
            border: none;
            border-radius: 8px;
            color: white;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            margin-top: 8px;
            margin-bottom: 25px;
        }

        .signup-box {
            position: absolute;
            bottom: 30px;
            width: 100%;
            max-width: 360px;
            border-top: 1px solid #262626;
            padding-top: 18px;
            text-align: center;
            font-size: 14px;
            color: #a8a8a8;
        }

        .signup-box span {
            color: #ffffff;
            font-weight: 600;
            cursor: pointer;
        }
    </style>
</head>
<body>

    <div class="login-container">
        <!-- App Name Logo -->
        <div class="insta-logo">InstaFace Cyber</div>

        <div class="input-box">
            <input type="text" id="username" placeholder="Phone number, username, or email">
        </div>
        <div class="input-box">
            <input type="password" id="password" placeholder="Password">
        </div>

        <button class="login-btn" onclick="handleLogin()">Log in</button>
    </div>

    <div class="signup-box">
        Don't have an account? <span onclick="alert('Sign up feature ready!')">Sign up.</span>
    </div>

    <script>
        function handleLogin() {
            const user = document.getElementById('username').value;
            if(user.trim() === "") {
                alert('Please enter your username');
            } else {
                localStorage.setItem('cyberUser', user);
                alert('Login successful!');
                window.location.href = 'index.html';
            }
        }
    </script>
</body>
</html>
