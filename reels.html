 <!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Cyber Reels</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --bg-color: #000; --accent: #a855f7; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body { background: var(--bg-color); color: #fff; display: flex; justify-content: center; height: 100vh; overflow: hidden; }
        .reels-container { width: 100%; max-width: 480px; height: 100vh; position: relative; background: #000; display: flex; flex-direction: column; }
        .reels-header { position: absolute; top: 0; left: 0; right: 0; height: 60px; padding: 0 20px; display: flex; justify-content: space-between; align-items: center; z-index: 10; background: linear-gradient(to bottom, rgba(0,0,0,0.8), transparent); }
        .reels-header h2 { font-size: 20px; font-weight: 800; background: linear-gradient(90deg, #6366f1, #a855f7); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .reels-feed { flex: 1; overflow-y: scroll; scroll-snap-type: y mandatory; scrollbar-width: none; }
        .reels-feed::-webkit-scrollbar { display: none; }
        .reel-video-box { width: 100%; height: 100vh; scroll-snap-align: start; position: relative; background: #050505; }
        video { width: 100%; height: 100%; object-fit: cover; }
        .reel-actions { position: absolute; right: 15px; bottom: 100px; display: flex; flex-direction: column; gap: 22px; align-items: center; z-index: 5; }
        .action-item { display: flex; flex-direction: column; align-items: center; cursor: pointer; }
        .action-item i { font-size: 26px; text-shadow: 0 2px 10px rgba(0,0,0,0.5); }
        .action-item span { font-size: 12px; margin-top: 5px; }
        .fa-heart.liked { color: #ef4444; }
        .reel-meta { position: absolute; left: 15px; bottom: 90px; right: 80px; z-index: 5; text-shadow: 0 2px 8px rgba(0,0,0,0.8); }
        .user-info { display: flex; align-items: center; gap: 10px; margin-bottom: 8px; }
        .user-info img { width: 32px; height: 32px; border-radius: 50%; border: 2px solid var(--accent); }
        .caption { font-size: 13px; color: #e5e7eb; }
        .bottom-nav { width: 100%; height: 60px; background: rgba(0, 0, 0, 0.9); border-top: 1px solid #1f2937; position: absolute; bottom: 0; display: flex; justify-content: space-around; align-items: center; z-index: 10; }
        .bottom-nav i { font-size: 20px; color: #9ca3af; cursor: pointer; }
        .bottom-nav i.active { color: var(--accent); }
        #shareModal { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.8); display: flex; align-items: flex-end; z-index: 1000; opacity: 0; pointer-events: none; transition: opacity 0.3s; }
        #shareModal.open { opacity: 1; pointer-events: auto; }
    </style>
</head>
<body>
    <div class="reels-container">
        <div class="reels-header">
            <h2>Cyber Reels</h2>
        </div>
        <div class="reels-feed" id="reelsFeed">
            <div class="reel-video-box">
                <video src="https://assets.mixkit.co/videos/preview/mixkit-neon-light-from-a-tunnel-in-a-futuristic-city-43225-large.mp4" loop muted playsinline onclick="this.paused ? this.play() : this.pause()"></video>
                <div class="reel-actions">
                    <div class="action-item" onclick="this.querySelector('i').classList.toggle('liked')">
                        <i class="fa-solid fa-heart"></i>
                        <span>4.2k</span>
                    </div>
                    <div class="action-item" onclick="document.getElementById('shareModal').classList.add('open')">
                        <i class="fa-solid fa-paper-plane"></i>
                        <span>Share</span>
                    </div>
                </div>
                <div class="reel-meta">
                    <div class="user-info">
                        <img src="https://images.unsplash.com/photo-1534528741775-53994a69daeb?w=150">
                        <span>neon_vector</span>
                    </div>
                    <p class="caption">Cruising through the cyber grid! ⚡🌐</p>
                </div>
            </div>
        </div>

        <div id="shareModal">
            <div style="background: #170f26; border-radius: 24px 24px 0 0; width: 100%; max-width: 480px; padding: 24px; text-align: center; margin: 0 auto;">
                <h3>Share Reel</h3>
                <div style="display: flex; justify-content: space-around; margin: 20px 0;">
                    <div onclick="navigator.clipboard.writeText(window.location.href); alert('Link Copied!'); document.getElementById('shareModal').classList.remove('open');" style="cursor: pointer;">
                        <i class="fa-solid fa-copy" style="font-size: 24px; color: #a855f7;"></i>
                        <p style="font-size: 12px; margin-top: 5px;">Copy Link</p>
                    </div>
                </div>
                <button onclick="document.getElementById('shareModal').classList.remove('open')" style="width: 100%; padding: 12px; background: #252836; border: none; border-radius: 30px; color: white; cursor: pointer;">Cancel</button>
            </div>
        </div>

        <div class="bottom-nav">
            <i class="fa-solid fa-layer-group" onclick="window.location.href='index.html'"></i>
            <i class="fa-solid fa-video active"></i>
            <i class="fa-regular fa-compass"></i>
            <i class="fa-regular fa-user" onclick="window.location.href='login.html'"></i>
        </div>
    </div>
</body>
</html>
